<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Vocabulary Notebook</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap');

:root{
  --paper:#F6F3ED;
  --ink:#1E2A45;
  --ink-soft:#5A6478;
  --accent:#E8542E;
  --grid:#DCE2EC;
  --success:#4F8A5B;
  --warn:#C9A227;
  --muted:#9C9686;
  --card:#FFFFFF;
}

*{box-sizing:border-box;}

body{
  margin:0;
  font-family:'IBM Plex Sans',sans-serif;
  color:var(--ink);
  background-color:var(--paper);
  background-image:radial-gradient(circle, var(--grid) 1px, transparent 1px);
  background-size:22px 22px;
  line-height:1.55;
  padding:0 0 60px;
}

.filebar{
  background:var(--ink);
  color:var(--paper);
  padding:14px 20px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  flex-wrap:wrap;
  gap:10px;
  font-family:'IBM Plex Mono',monospace;
  font-size:12px;
  letter-spacing:0.06em;
  position:sticky;
  top:0;
  z-index:10;
}
.filebar .tag{
  background:var(--accent);
  color:#fff;
  padding:2px 8px;
  border-radius:3px;
  font-weight:600;
}
.filebar .count{font-family:'IBM Plex Mono',monospace;}
.filebar .due-badge{
  background:var(--warn);
  color:var(--ink);
  padding:2px 8px;
  border-radius:3px;
  font-weight:600;
}

.wrap{
  max-width:880px;
  margin:0 auto;
  padding:32px 20px 0;
}

.hero{margin-bottom:22px;}
.hero .eyebrow{
  font-family:'IBM Plex Mono',monospace;
  font-size:12px;
  letter-spacing:0.18em;
  text-transform:uppercase;
  color:var(--accent);
  margin-bottom:8px;
}
.hero h1{
  font-family:'Space Grotesk',sans-serif;
  font-size:30px;
  margin:0 0 8px;
}
.hero p{
  max-width:620px;
  color:var(--ink-soft);
  font-size:14px;
  margin:0;
}

/* ---- Tabs ---- */
.tabs{
  display:flex;
  gap:4px;
  margin-bottom:22px;
  border-bottom:1px solid var(--grid);
  flex-wrap: wrap;
}
.tab-btn{
  font-family:'IBM Plex Mono',monospace;
  font-size:12px;
  letter-spacing:0.08em;
  text-transform:uppercase;
  background:none;
  border:none;
  padding:10px 4px;
  margin-right:18px;
  cursor:pointer;
  color:var(--ink-soft);
  border-bottom:2px solid transparent;
  position:relative;
  top:1px;
}
.tab-btn.active{
  color:var(--ink);
  border-bottom-color:var(--accent);
  font-weight: 600;
}
.tab-btn .badge{
  background:var(--warn);
  color:var(--ink);
  border-radius:3px;
  padding:0 5px;
  font-size:10px;
  margin-left:6px;
}
.tab-panel{display:none;}
.tab-panel.active{display:block;}

/* ---- Add form / frames ---- */
.add-frame, .session-frame{
  position:relative;
  background:var(--card);
  border:1px solid var(--ink);
  padding:20px;
  margin-bottom:20px;
}
.corner{position:absolute;width:13px;height:13px;border:2px solid var(--accent);}
.corner.tl{top:-2px;left:-2px;border-right:none;border-bottom:none;}
.corner.tr{top:-2px;right:-2px;border-left:none;border-bottom:none;}
.corner.bl{bottom:-2px;left:-2px;border-right:none;border-top:none;}
.corner.br{bottom:-2px;right:-2px;border-left:none;border-top:none;}

.frame-label{
  font-family:'IBM Plex Mono',monospace;
  font-size:11px;
  letter-spacing:0.14em;
  text-transform:uppercase;
  color:var(--ink-soft);
  margin-bottom:14px;
}

.form-grid{
  display:grid;
  grid-template-columns:2fr 1fr 1fr;
  gap:12px;
  margin-bottom:12px;
}
.form-grid-2{
  display:grid;
  grid-template-columns:3fr 1fr;
  gap:12px;
  margin-bottom:12px;
}
.form-row-full{margin-bottom:12px;}

label.field-label{
  display:block;
  font-family:'IBM Plex Mono',monospace;
  font-size:10px;
  letter-spacing:0.1em;
  text-transform:uppercase;
  color:var(--ink-soft);
  margin-bottom:5px;
}

input[type="text"], textarea, select{
  width:100%;
  border:1px solid var(--grid);
  border-radius:4px;
  padding:9px 10px;
  font-family:'IBM Plex Sans',sans-serif;
  font-size:14px;
  color:var(--ink);
  background:#fff;
}
input[type="text"]:focus, textarea:focus, select:focus{
  outline:none;
  border-color:var(--accent);
}
textarea{resize:vertical;min-height:54px;}

.sentence-textarea {
  min-height: 80px;
  font-size: 15px;
}

.btn{
  font-family:'IBM Plex Mono',monospace;
  font-size:12px;
  letter-spacing:0.06em;
  border:1px solid var(--ink);
  border-radius:4px;
  padding:9px 16px;
  background:var(--ink);
  color:#fff;
  cursor:pointer;
  transition:opacity 0.15s;
}
.btn:hover{opacity:0.85;}
.btn-ghost{
  background:none;
  color:var(--ink-soft);
  border-color:var(--grid);
}
.btn-ghost:hover{border-color:var(--accent);color:var(--accent);}
.btn-danger{
  background:none;
  color:var(--accent);
  border-color:var(--accent);
}
.btn-danger:hover{background:var(--accent);color:#fff;}
.btn-success{
  background:var(--success);
  border-color:var(--success);
  color:#fff;
}
.btn-warn{
  background:#fff;
  border-color:var(--warn);
  color:var(--warn);
}
.btn-warn:hover{background:var(--warn);color:#fff;}
.btn-sm{padding:5px 10px;font-size:11px;}
.btn-row{display:flex;gap:8px;flex-wrap:wrap;}

/* ---- Toolbar ---- */
.toolbar{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  margin-bottom:18px;
  align-items:center;
}
.toolbar input[type="text"]{flex:1;min-width:160px;}
.toolbar select{width:auto;min-width:110px;}
.empty-msg{
  text-align:center;
  color:var(--muted);
  font-family:'IBM Plex Mono',monospace;
  font-size:13px;
  padding:40px 0;
  border:1px dashed var(--grid);
  border-radius:6px;
}

/* ---- Entry cards ---- */
.entry{
  position:relative;
  background:var(--card);
  border:1px solid var(--grid);
  border-left:4px solid var(--accent);
  border-radius:4px;
  padding:14px 16px;
  margin-bottom:10px;
}
.entry.type-phrase{border-left-color:var(--success);}
.entry.type-sentence{border-left-color:#6C8EBF;}

.entry-head{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  gap:10px;
  margin-bottom:6px;
}
.entry-term{
  font-family:'IBM Plex Mono',monospace;
  font-weight:600;
  font-size:15px;
  white-space:pre-wrap;
  word-break:break-word;
  line-height: 1.4;
  flex: 1;
}
.entry-meta{
  display:flex;
  gap:6px;
  align-items:flex-start;
  flex-wrap:wrap;
  flex: 1;
}
.type-badge{
  font-family:'IBM Plex Mono',monospace;
  font-size:10px;
  letter-spacing:0.08em;
  text-transform:uppercase;
  border:1px solid var(--grid);
  border-radius:3px;
  padding:2px 6px;
  color:var(--ink-soft);
  margin-top: 2px;
}
.tag-badge{
  font-family:'IBM Plex Mono',monospace;
  font-size:10px;
  letter-spacing:0.05em;
  background:var(--paper);
  border:1px solid var(--grid);
  border-radius:3px;
  padding:2px 6px;
  color:var(--ink-soft);
  margin-top: 2px;
}
.level-badge{
  font-family:'IBM Plex Mono',monospace;
  font-size:10px;
  letter-spacing:0.05em;
  border-radius:3px;
  padding:2px 6px;
  color:var(--ink-soft);
  border:1px solid var(--grid);
  margin-top: 2px;
}
.entry-translation{
  color:var(--ink-soft);
  font-size:13.5px;
  margin-bottom:4px;
  white-space:pre-wrap;
}
.entry-note{
  font-size:13px;
  color:var(--ink);
  background:#FBF8F2;
  border-radius:3px;
  padding:8px 10px;
  margin-top:6px;
  white-space:pre-wrap;
}
.entry-date{
  font-family:'IBM Plex Mono',monospace;
  font-size:10px;
  color:var(--muted);
  margin-top:6px;
}
.entry-actions{
  display:flex;
  gap:6px;
  flex-shrink:0;
}

/* ---- Review session ---- */
.session-setup{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:6px;}
.session-setup select{width:auto;min-width:160px;}

.flashcard{
  border:1px solid var(--grid);
  border-radius:6px;
  padding:30px 24px;
  text-align:center;
  margin:14px 0;
  min-height:140px;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:10px;
}
.flashcard .fc-term{
  font-family:'Space Grotesk',sans-serif;
  font-size:24px;
  font-weight:600;
  white-space:pre-wrap;
  word-break:break-word;
  line-height: 1.3;
}
.flashcard .fc-meta{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;}
.flashcard .fc-back{
  margin-top:10px;
  border-top:1px dashed var(--grid);
  padding-top:14px;
  width:100%;
}
.flashcard .fc-translation{font-size:16px;color:var(--ink-soft);margin-bottom:6px;white-space:pre-wrap;}
.flashcard .fc-note{
  font-size:13px;
  background:#FBF8F2;
  border-radius:3px;
  padding:8px 10px;
  white-space:pre-wrap;
  text-align:left;
}
.progress-row{
  display:flex;
  justify-content:space-between;
  font-family:'IBM Plex Mono',monospace;
  font-size:11px;
  color:var(--ink-soft);
  margin-bottom:6px;
}
.rate-row{display:flex;gap:8px;justify-content:center;margin-top:14px;flex-wrap:wrap;}

/* ---- Quiz ---- */
.quiz-question{
  font-family:'Space Grotesk',sans-serif;
  font-size:20px;
  font-weight:600;
  text-align:center;
  margin:16px 0;
  white-space:pre-wrap;
  word-break:break-word;
  line-height: 1.3;
}
.quiz-options{
  display:flex;
  flex-direction:column;
  gap:8px;
  max-width:480px;
  margin:0 auto;
}
.quiz-option{
  border:1px solid var(--grid);
  border-radius:4px;
  padding:10px 14px;
  font-size:14px;
  text-align:left;
  background:#fff;
  cursor:pointer;
  transition:border-color 0.15s, background 0.15s;
}
.quiz-option:hover{border-color:var(--accent);}
.quiz-option.correct{border-color:var(--success);background:#F0F7F1;}
.quiz-option.incorrect{border-color:var(--accent);background:#FFF3F0;}
.quiz-option:disabled{cursor:default;}
.quiz-progress{
  font-family:'IBM Plex Mono',monospace;
  font-size:11px;
  color:var(--ink-soft);
  text-align:center;
  margin-bottom:6px;
}
.quiz-score{
  font-family:'Space Grotesk',sans-serif;
  font-size:26px;
  text-align:center;
  margin:20px 0 10px;
}
.center{text-align:center;}

@media (max-width:640px){
  .form-grid, .form-grid-2 {grid-template-columns:1fr;}
  .hero h1{font-size:24px;}
}
</style>
</head>
<body>

<div class="filebar">
  <div>Vocabulary_Notebook <span class="tag">UX / Job Search English</span></div>
  <div style="display:flex;gap:8px;align-items:center;">
    <span class="due-badge" id="due-badge" style="display:none;"></span>
    <span class="count" id="entry-count">0 entries</span>
  </div>
</div>

<div class="wrap">

  <div class="hero">
    <div class="eyebrow">My Notes</div>
    <h1>词汇 · 句子笔记本</h1>
    <p>分开记录你的单词和精彩长句，用「每日复习」和「测验」检验记忆效果。所有内容保存在这个浏览器里，下次打开自动加载。</p>
  </div>

  <div class="tabs">
    <button class="tab-btn active" data-tab="words" onclick="switchTab('words')">单词与短语 Words</button>
    <button class="tab-btn" data-tab="sentences" onclick="switchTab('sentences')">长句记录 Sentences</button>
    <button class="tab-btn" data-tab="review" onclick="switchTab('review')">每日复习 Review <span class="badge" id="review-tab-badge" style="display:none;"></span></button>
    <button class="tab-btn" data-tab="quiz" onclick="switchTab('quiz')">测验 Quiz</button>
  </div>

  <div class="tab-panel active" id="tab-words">

    <div class="add-frame">
      <span class="corner tl"></span><span class="corner tr"></span>
      <span class="corner bl"></span><span class="corner br"></span>
      <div class="frame-label">+ 新增单词 / 短语</div>

      <div class="form-grid">
        <div>
          <label class="field-label">单词 / 短语 (English)</label>
          <input type="text" id="word-term" placeholder="e.g. affordance / be passionate about">
        </div>
        <div>
          <label class="field-label">类型</label>
          <select id="word-type">
            <option value="word">单词 Word</option>
            <option value="phrase">短语 Phrase</option>
          </select>
        </div>
        <div>
          <label class="field-label">标签 Tag</label>
          <input type="text" id="word-tag" placeholder="e.g. UX / Interview">
        </div>
      </div>

      <div class="form-row-full">
        <label class="field-label">中文意思 / 翻译</label>
        <input type="text" id="word-translation" placeholder="对应的中文意思">
      </div>

      <div class="form-row-full">
        <label class="field-label">笔记 / 例句</label>
        <textarea id="word-note" placeholder="例句、搭配、容易混淆的点等..."></textarea>
      </div>

      <button class="btn" onclick="addEntry('word')">添加单词记录</button>
    </div>

    <div class="toolbar">
      <input type="text" id="search-words" placeholder="搜索单词/短语..." oninput="render()">
      <select id="filter-type-words" onchange="render()">
        <option value="">全部类型</option>
        <option value="word">单词</option>
        <option value="phrase">短语</option>
      </select>
      <select id="filter-tag-words" onchange="render()">
        <option value="">全部标签</option>
      </select>
      <select id="sort-words" onchange="render()">
        <option value="new">最新优先</option>
        <option value="old">最早优先</option>
      </select>
      <button class="btn btn-ghost btn-sm" onclick="exportData()">导出全部备份</button>
      <button class="btn btn-ghost btn-sm" onclick="document.getElementById('import-file').click()">导入备份</button>
    </div>

    <div id="words-entries"></div>
  </div>

  <div class="tab-panel" id="tab-sentences">

    <div class="add-frame">
      <span class="corner tl"></span><span class="corner tr"></span>
      <span class="corner bl"></span><span class="corner br"></span>
      <div class="frame-label">+ 新增长句</div>

      <div class="form-grid-2">
        <div>
          <label class="field-label">句子 (English Sentence)</label>
          <textarea id="sentence-term" class="sentence-textarea" placeholder="e.g. I have hands-on experience in leading cross-functional teams..."></textarea>
        </div>
        <div>
          <label class="field-label">标签 Tag</label>
          <input type="text" id="sentence-tag" placeholder="e.g. Interview / Email">
        </div>
      </div>

      <div class="form-row-full">
        <label class="field-label">中文翻译</label>
        <textarea id="sentence-translation" placeholder="对应的中文翻译" style="min-height: 40px;"></textarea>
      </div>

      <div class="form-row-full">
        <label class="field-label">句型分析 / 笔记</label>
        <textarea id="sentence-note" placeholder="这个句子好在哪里？可以替换的词有哪些？"></textarea>
      </div>

      <button class="btn" onclick="addEntry('sentence')">添加长句记录</button>
    </div>

    <div class="toolbar">
      <input type="text" id="search-sentences" placeholder="搜索句子..." oninput="render()">
      <select id="filter-tag-sentences" onchange="render()">
        <option value="">全部标签</option>
      </select>
      <select id="sort-sentences" onchange="render()">
        <option value="new">最新优先</option>
        <option value="old">最早优先</option>
      </select>
      <button class="btn btn-ghost btn-sm" onclick="exportData()">导出全部备份</button>
      <button class="btn btn-ghost btn-sm" onclick="document.getElementById('import-file').click()">导入备份</button>
    </div>

    <div id="sentences-entries"></div>
  </div>


  <div class="tab-panel" id="tab-review">
    <div class="session-frame">
      <span class="corner tl"></span><span class="corner tr"></span>
      <span class="corner bl"></span><span class="corner br"></span>
      <div class="frame-label">每日复习 — Flashcard Review</div>

      <div id="review-content"></div>
    </div>
  </div>

  <div class="tab-panel" id="tab-quiz">
    <div class="session-frame">
      <span class="corner tl"></span><span class="corner tr"></span>
      <span class="corner bl"></span><span class="corner br"></span>
      <div class="frame-label">测验 — Multiple Choice Quiz</div>

      <div id="quiz-content"></div>
    </div>
  </div>

</div>

<input type="file" id="import-file" accept="application/json" style="display:none;" onchange="importData(event)">

<script>
let entries = [];
let editingId = null;

const STORAGE_KEY = 'vocab-notebook-entries';
const DAY = 24*60*60*1000;
const LEVEL_INTERVALS = [1,1,2,4,7,15,30];

/* ============ STORAGE ============ */

function loadEntries(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(raw){
      entries = JSON.parse(raw);
    }
  }catch(e){
    entries = [];
  }
  entries.forEach(e => {
    if(typeof e.reviewLevel !== 'number') e.reviewLevel = 0;
    if(typeof e.nextReview !== 'number') e.nextReview = Date.now();
    if(typeof e.lastReviewed !== 'number') e.lastReviewed = 0;
  });
  render();
  renderReview();
}

function saveEntries(){
  try{
    localStorage.setItem(STORAGE_KEY, JSON.stringify(entries));
  }catch(e){
    console.error('Save failed', e);
  }
  updateDueBadge();
}

/* ============ TABS ============ */

function switchTab(tab){
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  if(tab === 'review') renderReview();
  if(tab === 'quiz') renderQuizSetup();
}

function updateDueBadge(){
  const due = entries.filter(e => (e.translation || e.note) && e.nextReview <= Date.now()).length;
  const filebarBadge = document.getElementById('due-badge');
  const tabBadge = document.getElementById('review-tab-badge');
  if(due > 0){
    filebarBadge.style.display = 'inline-block';
    filebarBadge.textContent = `${due} due today`;
    tabBadge.style.display = 'inline-block';
    tabBadge.textContent = due;
  }else{
    filebarBadge.style.display = 'none';
    tabBadge.style.display = 'none';
  }
}

/* ============ ADD / EDIT / DELETE ============ */

function addEntry(mode){
  let term, type, tag, translation, note;

  if (mode === 'word') {
    term = document.getElementById('word-term').value.trim();
    type = document.getElementById('word-type').value;
    tag = document.getElementById('word-tag').value.trim();
    translation = document.getElementById('word-translation').value.trim();
    note = document.getElementById('word-note').value.trim();
    
    if(!term){ document.getElementById('word-term').focus(); return; }
  } else if (mode === 'sentence') {
    term = document.getElementById('sentence-term').value.trim();
    type = 'sentence';
    tag = document.getElementById('sentence-tag').value.trim();
    translation = document.getElementById('sentence-translation').value.trim();
    note = document.getElementById('sentence-note').value.trim();

    if(!term){ document.getElementById('sentence-term').focus(); return; }
  }

  entries.unshift({
    id: 'e' + Date.now(),
    term, type, tag, translation, note,
    createdAt: Date.now(),
    reviewLevel: 0,
    nextReview: Date.now(),
    lastReviewed: 0
  });

  if (mode === 'word') {
    document.getElementById('word-term').value = '';
    document.getElementById('word-tag').value = '';
    document.getElementById('word-translation').value = '';
    document.getElementById('word-note').value = '';
    document.getElementById('word-term').focus();
  } else {
    document.getElementById('sentence-term').value = '';
    document.getElementById('sentence-tag').value = '';
    document.getElementById('sentence-translation').value = '';
    document.getElementById('sentence-note').value = '';
    document.getElementById('sentence-term').focus();
  }

  saveEntries();
  render();
}

function deleteEntry(id){
  entries = entries.filter(e => e.id !== id);
  saveEntries();
  render();
}

function startEdit(id){
  editingId = id;
  render();
}

function cancelEdit(){
  editingId = null;
  render();
}

function saveEdit(id){
  const entry = entries.find(e => e.id === id);
  if (entry.type === 'sentence') {
    entry.term = document.getElementById('edit-sen-term-'+id).value.trim();
    entry.tag = document.getElementById('edit-sen-tag-'+id).value.trim();
    entry.translation = document.getElementById('edit-sen-translation-'+id).value.trim();
    entry.note = document.getElementById('edit-sen-note-'+id).value.trim();
  } else {
    entry.term = document.getElementById('edit-word-term-'+id).value.trim();
    entry.type = document.getElementById('edit-word-type-'+id).value;
    entry.tag = document.getElementById('edit-word-tag-'+id).value.trim();
    entry.translation = document.getElementById('edit-word-translation-'+id).value.trim();
    entry.note = document.getElementById('edit-word-note-'+id).value.trim();
  }
  editingId = null;
  saveEntries();
  render();
}

/* ============ HELPERS ============ */

function typeLabel(type){
  if(type === 'word') return '单词';
  if(type === 'phrase') return '短语';
  if(type === 'sentence') return '句子';
  return type;
}

function formatDate(ts){
  if(!ts) return '—';
  const d = new Date(ts);
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}

function escapeHtml(str){
  const div = document.createElement('div');
  div.textContent = str || '';
  return div.innerHTML;
}

function shuffle(arr){
  const a = arr.slice();
  for(let i = a.length - 1; i > 0; i--){
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

/* ============ RENDER LOGIC ============ */

function updateFilters(){
  const wordsTagSelect = document.getElementById('filter-tag-words');
  const senTagSelect = document.getElementById('filter-tag-sentences');
  
  const wordTags = [...new Set(entries.filter(e => e.type !== 'sentence').map(e => e.tag).filter(Boolean))].sort();
  const senTags = [...new Set(entries.filter(e => e.type === 'sentence').map(e => e.tag).filter(Boolean))].sort();

  const currentWT = wordsTagSelect.value;
  wordsTagSelect.innerHTML = '<option value="">全部标签</option>' + wordTags.map(t => `<option value="${escapeHtml(t)}">${escapeHtml(t)}</option>`).join('');
  if(wordTags.includes(currentWT)) wordsTagSelect.value = currentWT;

  const currentST = senTagSelect.value;
  senTagSelect.innerHTML = '<option value="">全部标签</option>' + senTags.map(t => `<option value="${escapeHtml(t)}">${escapeHtml(t)}</option>`).join('');
  if(senTags.includes(currentST)) senTagSelect.value = currentST;
}

function generateEntryHTML(e) {
  if(editingId === e.id){
    if (e.type === 'sentence') {
      return `
        <div class="entry editing type-sentence">
          <div class="form-grid-2">
            <div>
              <label class="field-label">句子</label>
              <textarea id="edit-sen-term-${e.id}" class="sentence-textarea">${escapeHtml(e.term)}</textarea>
            </div>
            <div>
              <label class="field-label">标签</label>
              <input type="text" id="edit-sen-tag-${e.id}" value="${escapeHtml(e.tag)}">
            </div>
          </div>
          <div class="form-row-full">
            <label class="field-label">中文翻译</label>
            <textarea id="edit-sen-translation-${e.id}" style="min-height: 40px;">${escapeHtml(e.translation)}</textarea>
          </div>
          <div class="form-row-full">
            <label class="field-label">句型分析 / 笔记</label>
            <textarea id="edit-sen-note-${e.id}">${escapeHtml(e.note)}</textarea>
          </div>
          <div class="entry-actions">
            <button class="btn btn-sm" onclick="saveEdit('${e.id}')">保存</button>
            <button class="btn btn-ghost btn-sm" onclick="cancelEdit()">取消</button>
          </div>
        </div>
      `;
    } else {
      return `
        <div class="entry editing type-${e.type}">
          <div class="form-grid">
            <div>
              <label class="field-label">单词 / 短语</label>
              <input type="text" id="edit-word-term-${e.id}" value="${escapeHtml(e.term)}">
            </div>
            <div>
              <label class="field-label">类型</label>
              <select id="edit-word-type-${e.id}">
                <option value="word" ${e.type==='word'?'selected':''}>单词 Word</option>
                <option value="phrase" ${e.type==='phrase'?'selected':''}>短语 Phrase</option>
              </select>
            </div>
            <div>
              <label class="field-label">标签</label>
              <input type="text" id="edit-word-tag-${e.id}" value="${escapeHtml(e.tag)}">
            </div>
          </div>
          <div class="form-row-full">
            <label class="field-label">中文意思 / 翻译</label>
            <input type="text" id="edit-word-translation-${e.id}" value="${escapeHtml(e.translation)}">
          </div>
          <div class="form-row-full">
            <label class="field-label">笔记 / 例句</label>
            <textarea id="edit-word-note-${e.id}">${escapeHtml(e.note)}</textarea>
          </div>
          <div class="entry-actions">
            <button class="btn btn-sm" onclick="saveEdit('${e.id}')">保存</button>
            <button class="btn btn-ghost btn-sm" onclick="cancelEdit()">取消</button>
          </div>
        </div>
      `;
    }
  }

  const dueToday = (e.translation || e.note) && e.nextReview <= Date.now();
  return `
    <div class="entry type-${e.type}">
      <div class="entry-head">
        <div class="entry-meta">
          <div class="entry-term">${escapeHtml(e.term)}</div>
          <div style="display:flex;gap:6px;flex-wrap:wrap;align-items:center;margin-top:4px;">
            <span class="type-badge">${typeLabel(e.type)}</span>
            ${e.tag ? `<span class="tag-badge">${escapeHtml(e.tag)}</span>` : ''}
            <span class="level-badge" title="复习等级 / 下次复习日期">Lv.${e.reviewLevel} · 下次 ${formatDate(e.nextReview)}${dueToday ? ' · 待复习' : ''}</span>
          </div>
        </div>
        <div class="entry-actions">
          <button class="btn btn-ghost btn-sm" onclick="startEdit('${e.id}')">编辑</button>
          <button class="btn btn-danger btn-sm" onclick="deleteEntry('${e.id}')">删除</button>
        </div>
      </div>
      ${e.translation ? `<div class="entry-translation">${escapeHtml(e.translation)}</div>` : ''}
      ${e.note ? `<div class="entry-note">${escapeHtml(e.note)}</div>` : ''}
      <div class="entry-date">添加于 ${formatDate(e.createdAt)}${e.lastReviewed ? ` · 上次复习 ${formatDate(e.lastReviewed)}` : ''}</div>
    </div>
  `;
}

function render(){
  updateFilters();
  updateDueBadge();
  document.getElementById('entry-count').textContent = `总共 ${entries.length} 项记录`;

  const searchW = document.getElementById('search-words').value.trim().toLowerCase();
  const typeFilterW = document.getElementById('filter-type-words').value;
  const tagFilterW = document.getElementById('filter-tag-words').value;
  const sortW = document.getElementById('sort-words').value;

  let wordsList = entries.filter(e => e.type !== 'sentence');
  wordsList = wordsList.filter(e => {
    if(typeFilterW && e.type !== typeFilterW) return false;
    if(tagFilterW && e.tag !== tagFilterW) return false;
    if(searchW && ![e.term, e.translation, e.note, e.tag].join(' ').toLowerCase().includes(searchW)) return false;
    return true;
  });
  wordsList.sort((a,b) => sortW === 'old' ? a.createdAt - b.createdAt : b.createdAt - a.createdAt);
  
  const wordsContainer = document.getElementById('words-entries');
  if(entries.filter(e => e.type !== 'sentence').length === 0){
    wordsContainer.innerHTML = '<div class="empty-msg">还没有单词记录 — 在上方添加你的第一个单词或短语吧</div>';
  } else if(wordsList.length === 0){
    wordsContainer.innerHTML = '<div class="empty-msg">没有符合条件的单词记录</div>';
  } else {
    wordsContainer.innerHTML = wordsList.map(generateEntryHTML).join('');
  }

  const searchS = document.getElementById('search-sentences').value.trim().toLowerCase();
  const tagFilterS = document.getElementById('filter-tag-sentences').value;
  const sortS = document.getElementById('sort-sentences').value;

  let senList = entries.filter(e => e.type === 'sentence');
  senList = senList.filter(e => {
    if(tagFilterS && e.tag !== tagFilterS) return false;
    if(searchS && ![e.term, e.translation, e.note, e.tag].join(' ').toLowerCase().includes(searchS)) return false;
    return true;
  });
  senList.sort((a,b) => sortS === 'old' ? a.createdAt - b.createdAt : b.createdAt - a.createdAt);

  const senContainer = document.getElementById('sentences-entries');
  if(entries.filter(e => e.type === 'sentence').length === 0){
    senContainer.innerHTML = '<div class="empty-msg">还没有长句记录 — 在上方记录你在阅读中遇到的好句子吧</div>';
  } else if(senList.length === 0){
    senContainer.innerHTML = '<div class="empty-msg">没有符合条件的长句记录</div>';
  } else {
    senContainer.innerHTML = senList.map(generateEntryHTML).join('');
  }
}

/* ============ REVIEW (Flashcards) ============ */

let reviewQueue = [];
let reviewIndex = 0;
let reviewRevealed = false;
let reviewStats = {known:0, vague:0, forgot:0};

function reviewableEntries(mode = 'all'){
  return entries.filter(e => {
    if(!(e.translation || e.note)) return false;
    if(mode === 'words' && e.type === 'sentence') return false;
    if(mode === 'sentences' && e.type !== 'sentence') return false;
    return true;
  });
}

function dueEntries(mode = 'all'){
  const now = Date.now();
  return reviewableEntries(mode).filter(e => e.nextReview <= now);
}

function renderReview(){
  const content = document.getElementById('review-content');

  if(reviewQueue.length === 0){
    const dueWords = dueEntries('words').length;
    const allWords = reviewableEntries('words').length;
    const dueSens = dueEntries('sentences').length;
    const allSens = reviewableEntries('sentences').length;

    if(allWords === 0 && allSens === 0){
      content.innerHTML = '<div class="empty-msg">还没有可复习的内容 — 先去添加一些带翻译或笔记的词汇/长句吧</div>';
      return;
    }

    content.innerHTML = `
      <div style="display:flex; flex-direction:column; gap:16px;">
        <div style="border:1px solid var(--grid); border-left:4px solid var(--success); border-radius:4px; padding:16px; background:var(--card);">
          <div style="font-family:'Space Grotesk',sans-serif; font-size:16px; font-weight:600; margin-bottom:8px;">📝 单词与短语</div>
          <div style="font-size:13px; color:var(--ink-soft); margin-bottom:14px;">今日待复习：<b>${dueWords}</b> 项（总库共 ${allWords} 项）</div>
          <div class="btn-row">
            <button class="btn" onclick="startReview('words', false)" ${dueWords===0?'disabled':''}>开始今日复习</button>
            <button class="btn btn-ghost" onclick="startReview('words', true)" ${allWords===0?'disabled':''}>复习全部</button>
          </div>
        </div>
        
        <div style="border:1px solid var(--grid); border-left:4px solid #6C8EBF; border-radius:4px; padding:16px; background:var(--card);">
          <div style="font-family:'Space Grotesk',sans-serif; font-size:16px; font-weight:600; margin-bottom:8px;">📖 长句</div>
          <div style="font-size:13px; color:var(--ink-soft); margin-bottom:14px;">今日待复习：<b>${dueSens}</b> 项（总库共 ${allSens} 项）</div>
          <div class="btn-row">
            <button class="btn" onclick="startReview('sentences', false)" ${dueSens===0?'disabled':''}>开始今日复习</button>
            <button class="btn btn-ghost" onclick="startReview('sentences', true)" ${allSens===0?'disabled':''}>复习全部</button>
          </div>
        </div>
      </div>
    `;
    return;
  }

  if(reviewIndex >= reviewQueue.length){
    content.innerHTML = `
      <div class="quiz-score">复习完成！</div>
      <div class="center" style="font-family:'IBM Plex Mono',monospace;font-size:13px;color:var(--ink-soft);">
        记得 ${reviewStats.known} · 模糊 ${reviewStats.vague} · 忘记 ${reviewStats.forgot}
      </div>
      <div class="btn-row" style="justify-content:center;margin-top:18px;">
        <button class="btn" onclick="resetReview()">返回列表</button>
      </div>
    `;
    return;
  }

  const e = reviewQueue[reviewIndex];
  content.innerHTML = `
    <div class="progress-row">
      <span>第 ${reviewIndex + 1} / ${reviewQueue.length} 项</span>
      <span>Lv.${e.reviewLevel}</span>
    </div>
    <div class="flashcard">
      <div class="fc-meta">
        <span class="type-badge">${typeLabel(e.type)}</span>
        ${e.tag ? `<span class="tag-badge">${escapeHtml(e.tag)}</span>` : ''}
      </div>
      <div class="fc-term">${escapeHtml(e.term)}</div>
      ${reviewRevealed ? `
        <div class="fc-back">
          ${e.translation ? `<div class="fc-translation">${escapeHtml(e.translation)}</div>` : ''}
          ${e.note ? `<div class="fc-note">${escapeHtml(e.note)}</div>` : ''}
        </div>
      ` : ''}
    </div>
    ${!reviewRevealed ? `
      <div class="center"><button class="btn" onclick="revealCard()">显示答案</button></div>
    ` : `
      <div class="rate-row">
        <button class="btn btn-danger" onclick="rateCard('forgot')">忘记了</button>
        <button class="btn btn-warn" onclick="rateCard('vague')">模糊</button>
        <button class="btn btn-success" onclick="rateCard('known')">记得</button>
      </div>
    `}
  `;
}

function startReview(mode, all){
  reviewQueue = shuffle(all ? reviewableEntries(mode) : dueEntries(mode));
  reviewIndex = 0;
  reviewRevealed = false;
  reviewStats = {known:0, vague:0, forgot:0};
  renderReview();
}
function revealCard(){ reviewRevealed = true; renderReview(); }
function rateCard(rating){
  const e = reviewQueue[reviewIndex];
  const now = Date.now();
  e.lastReviewed = now;
  if(rating === 'known'){ e.reviewLevel = Math.min(e.reviewLevel + 1, LEVEL_INTERVALS.length - 1); reviewStats.known++; }
  else if(rating === 'vague'){ e.reviewLevel = Math.max(e.reviewLevel - 1, 0); reviewStats.vague++; }
  else{ e.reviewLevel = 0; reviewStats.forgot++; }
  e.nextReview = now + LEVEL_INTERVALS[e.reviewLevel] * DAY;
  saveEntries();
  reviewIndex++;
  reviewRevealed = false;
  renderReview();
  render();
}
function resetReview(){ reviewQueue = []; reviewIndex = 0; reviewRevealed = false; renderReview(); }

/* ============ QUIZ ============ */

let quizQuestions = [];
let quizIndex = 0;
let quizScore = 0;
let quizAnswered = false;

function quizEligibleEntries(mode = 'all'){
  return entries.filter(e => {
    if(!(e.translation && e.translation.trim())) return false;
    if(mode === 'words' && e.type === 'sentence') return false;
    if(mode === 'sentences' && e.type !== 'sentence') return false;
    return true;
  });
}

function getQuizOptionsHTML(length) {
  const maxQ = Math.min(length, 20);
  const options = [5,10,20].filter(n => n <= maxQ);
  if(options.length === 0 || options[options.length-1] !== maxQ) options.push(maxQ);
  return options.map(n => `<option value="${n}">${n} 题</option>`).join('');
}

function renderQuizSetup(){
  const content = document.getElementById('quiz-content');
  if(quizQuestions.length > 0 && quizIndex < quizQuestions.length){ renderQuizQuestion(); return; }
  if(quizQuestions.length > 0 && quizIndex >= quizQuestions.length){ renderQuizResult(); return; }

  const eligibleWords = quizEligibleEntries('words');
  const eligibleSens = quizEligibleEntries('sentences');

  if(eligibleWords.length < 2 && eligibleSens.length < 2){
    content.innerHTML = '<div class="empty-msg">每种类型至少需要2条带「中文翻译」的记录才能开始测验，先去补充翻译吧</div>';
    return;
  }

  content.innerHTML = `
    <div style="display:flex; flex-direction:column; gap:16px;">
      <div style="border:1px solid var(--grid); border-left:4px solid var(--success); border-radius:4px; padding:16px; background:var(--card); opacity:${eligibleWords.length < 2 ? '0.5' : '1'}">
        <div style="font-family:'Space Grotesk',sans-serif; font-size:16px; font-weight:600; margin-bottom:8px;">📝 单词与短语测验</div>
        <div class="session-setup">
          <span style="font-size:13px; color:var(--ink-soft); margin-right:10px;">可用题目：${eligibleWords.length}</span>
          ${eligibleWords.length >= 2 ? `
            <select id="quiz-count-words">${getQuizOptionsHTML(eligibleWords.length)}</select>
            <select id="quiz-direction-words">
              <option value="en2cn">看英文 → 选中文</option>
              <option value="cn2en">看中文 → 选英文</option>
            </select>
          ` : '<span style="font-size:12px;color:var(--accent);">需至少 2 个带翻译的记录</span>'}
        </div>
        <div class="btn-row" style="margin-top:14px;">
          <button class="btn" onclick="startQuiz('words')" ${eligibleWords.length < 2 ? 'disabled' : ''}>开始测验</button>
        </div>
      </div>

      <div style="border:1px solid var(--grid); border-left:4px solid #6C8EBF; border-radius:4px; padding:16px; background:var(--card); opacity:${eligibleSens.length < 2 ? '0.5' : '1'}">
        <div style="font-family:'Space Grotesk',sans-serif; font-size:16px; font-weight:600; margin-bottom:8px;">📖 长句测验</div>
        <div class="session-setup">
          <span style="font-size:13px; color:var(--ink-soft); margin-right:10px;">可用题目：${eligibleSens.length}</span>
          ${eligibleSens.length >= 2 ? `
            <select id="quiz-count-sentences">${getQuizOptionsHTML(eligibleSens.length)}</select>
            <select id="quiz-direction-sentences">
              <option value="en2cn">看英文 → 选中文</option>
              <option value="cn2en">看中文 → 选英文</option>
            </select>
          ` : '<span style="font-size:12px;color:var(--accent);">需至少 2 个带翻译的记录</span>'}
        </div>
        <div class="btn-row" style="margin-top:14px;">
          <button class="btn" onclick="startQuiz('sentences')" ${eligibleSens.length < 2 ? 'disabled' : ''}>开始测验</button>
        </div>
      </div>
    </div>
  `;
}

function startQuiz(mode){
  const count = parseInt(document.getElementById(`quiz-count-${mode}`).value, 10);
  const direction = document.getElementById(`quiz-direction-${mode}`).value;
  const eligible = quizEligibleEntries(mode);
  const chosen = shuffle(eligible).slice(0, count);
  quizQuestions = chosen.map(e => {
    const correct = direction === 'en2cn' ? e.translation : e.term;
    const pool = eligible.filter(o => o.id !== e.id);
    const distractors = shuffle(pool).slice(0, 3).map(o => direction === 'en2cn' ? o.translation : o.term);
    return { prompt: direction === 'en2cn' ? e.term : e.translation, correct, options: shuffle([correct, ...distractors]), direction };
  });
  quizIndex = 0; quizScore = 0; quizAnswered = false;
  renderQuizQuestion();
}

function renderQuizQuestion(){
  const content = document.getElementById('quiz-content');
  const q = quizQuestions[quizIndex];
  content.innerHTML = `
    <div class="quiz-progress">第 ${quizIndex + 1} / ${quizQuestions.length} 题 · 得分 ${quizScore}</div>
    <div class="quiz-question">${escapeHtml(q.prompt)}</div>
    <div class="quiz-options">
      ${q.options.map((opt, i) => `<button class="quiz-option" id="quiz-opt-${i}" onclick="answerQuiz(${i})">${escapeHtml(opt)}</button>`).join('')}
    </div>
  `;
}

function answerQuiz(i){
  if(quizAnswered) return;
  quizAnswered = true;
  const q = quizQuestions[quizIndex];
  if(q.options[i] === q.correct) quizScore++;
  q.options.forEach((opt, idx) => {
    const btn = document.getElementById('quiz-opt-' + idx);
    btn.disabled = true;
    if(opt === q.correct) btn.classList.add('correct');
    else if(idx === i) btn.classList.add('incorrect');
  });
  document.getElementById('quiz-content').innerHTML += `<div class="btn-row" style="justify-content:center;margin-top:16px;"><button class="btn" onclick="nextQuiz()">${quizIndex + 1 < quizQuestions.length ? '下一题' : '查看结果'}</button></div>`;
}

function nextQuiz(){
  quizIndex++; quizAnswered = false;
  if(quizIndex >= quizQuestions.length) renderQuizResult();
  else renderQuizQuestion();
}

function renderQuizResult(){
  document.getElementById('quiz-content').innerHTML = `
    <div class="quiz-score">${quizScore} / ${quizQuestions.length}</div>
    <div class="center" style="font-family:'IBM Plex Mono',monospace;font-size:13px;color:var(--ink-soft);">正确率 ${Math.round(quizScore/quizQuestions.length*100)}%</div>
    <div class="btn-row" style="justify-content:center;margin-top:18px;"><button class="btn" onclick="restartQuiz()">再来一次</button></div>
  `;
}

function restartQuiz(){ quizQuestions = []; quizIndex = 0; quizScore = 0; quizAnswered = false; renderQuizSetup(); }

/* ============ EXPORT / IMPORT ============ */

function exportData(){
  const blob = new Blob([JSON.stringify(entries, null, 2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const d = new Date();
  const stamp = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
  a.href = url; a.download = `vocab-notebook-backup-${stamp}.json`;
  document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
}

function importData(event){
  const file = event.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = function(e){
    try{
      const imported = JSON.parse(e.target.result);
      if(!Array.isArray(imported)) throw new Error('Invalid format');
      if(confirm(`导入 ${imported.length} 条记录。\n点"确定"合并到现有记录，点"取消"替换全部现有记录。`)){
        const existingIds = new Set(entries.map(en => en.id));
        imported.forEach(im => { if(!existingIds.has(im.id)) entries.unshift(im); });
      }else{ entries = imported; }
      entries.forEach(e => {
        if(typeof e.reviewLevel !== 'number') e.reviewLevel = 0;
        if(typeof e.nextReview !== 'number') e.nextReview = Date.now();
        if(typeof e.lastReviewed !== 'number') e.lastReviewed = 0;
      });
      saveEntries(); render(); renderReview();
    }catch(err){ alert('导入失败：文件格式不正确'); }
    event.target.value = '';
  };
  reader.readAsText(file);
}

/* ============ INIT ============ */

document.getElementById('word-term').addEventListener('keydown', function(e){
  if(e.key === 'Enter') { addEntry('word'); }
});

document.getElementById('sentence-term').addEventListener('keydown', function(e){
  if(e.key === 'Enter' && (e.ctrlKey || e.metaKey)) { addEntry('sentence'); }
});

loadEntries();
